apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023

  role: KarpenterNodeRole-mern-eks

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: mern-eks // subnet tag

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: mern-eks // Node group security group tag